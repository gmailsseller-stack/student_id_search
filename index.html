<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>البحث عن كلمة المرور</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: 'Tahoma', Arial, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }
        .container {
            background: white;
            border-radius: 20px;
            padding: 40px;
            max-width: 500px;
            width: 100%;
            text-align: center;
            box-shadow: 0 20px 40px rgba(0,0,0,0.2);
        }
        h1 {
            color: #333;
            margin-bottom: 10px;
        }
        input {
            width: 100%;
            padding: 15px;
            font-size: 18px;
            border: 2px solid #ddd;
            border-radius: 10px;
            text-align: center;
            margin: 20px 0;
        }
        button {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            padding: 15px 30px;
            font-size: 18px;
            border-radius: 10px;
            cursor: pointer;
            width: 100%;
        }
        .result {
            margin-top: 20px;
            padding: 15px;
            border-radius: 10px;
            display: none;
        }
        .success {
            background: #d4edda;
            border: 1px solid #28a745;
            display: block;
        }
        .error {
            background: #f8d7da;
            border: 1px solid #dc3545;
            display: block;
        }
        .password {
            font-size: 28px;
            font-weight: bold;
            color: #28a745;
            margin: 10px 0;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>🔍 البحث عن كلمة المرور</h1>
        <p>أكاديمية مصر الحديثة</p>
        
        <input type="text" id="studentId" placeholder="أدخل رقم الجلوس">
        <button onclick="search()">بحث</button>
        
        <div class="result" id="result">
            <div id="resultText"></div>
        </div>
    </div>
    
    <script>
        const database = {
            "4220240": "100074",
            "4220061": "101499",
            "4210047": "100768"
        };
        
        function search() {
            const id = document.getElementById('studentId').value.trim();
            const resultDiv = document.getElementById('result');
            const resultText = document.getElementById('resultText');
            
            if (!id) {
                resultDiv.className = 'result error';
                resultText.innerHTML = '❌ الرجاء إدخال رقم الجلوس';
                return;
            }
            
            const password = database[id];
            
            if (password) {
                resultDiv.className = 'result success';
                resultText.innerHTML = `
                    ✅ تم العثور على النتيجة<br>
                    🆔 رقم الجلوس: ${id}<br>
                    🔑 كلمة المرور: <strong class="password">${password}</strong>
                `;
            } else {
                resultDiv.className = 'result error';
                resultText.innerHTML = `❌ رقم الجلوس ${id} غير موجود في قاعدة البيانات`;
            }
        }
        
        document.getElementById('studentId').addEventListener('keypress', function(e) {
            if (e.key === 'Enter') search();
        });
    </script>
</body>
</html>
