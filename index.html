    <title>البحث عن كلمة المرور - أكاديمية مصر الحديثة</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: 'Tahoma', 'Segoe UI', Arial, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }
        .container {
            background: white;
            border-radius: 20px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.2);
            padding: 40px;
            max-width: 500px;
            width: 100%;
            text-align: center;
        }
        h1 {
            color: #333;
            margin-bottom: 10px;
            font-size: 24px;
        }
        .subtitle {
            color: #666;
            margin-bottom: 30px;
            font-size: 14px;
        }
        .input-group {
            margin-bottom: 20px;
            text-align: right;
        }
        label {
            display: block;
            margin-bottom: 8px;
            color: #555;
            font-weight: bold;
        }
        input {
            width: 100%;
            padding: 15px;
            font-size: 18px;
            border: 2px solid #ddd;
            border-radius: 10px;
            transition: all 0.3s;
            text-align: center;
            font-family: monospace;
        }
        input:focus {
            outline: none;
            border-color: #667eea;
            box-shadow: 0 0 10px rgba(102,126,234,0.3);
        }
        button {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            padding: 15px 30px;
            font-size: 18px;
            border-radius: 10px;
            cursor: pointer;
            transition: transform 0.2s;
            width: 100%;
            font-weight: bold;
        }
        button:hover {
            transform: scale(1.02);
        }
        button:active {
            transform: scale(0.98);
        }
        .result {
            margin-top: 30px;
            padding: 20px;
            border-radius: 10px;
            display: none;
        }
        .result.success {
            background: #d4edda;
            border: 2px solid #28a745;
            display: block;
        }
        .result.error {
            background: #f8d7da;
            border: 2px solid #dc3545;
            display: block;
        }
        .result h3 {
            margin-bottom: 10px;
        }
        .result.success h3 {
            color: #155724;
        }
        .result.error h3 {
            color: #721c24;
        }
        .password {
            font-size: 32px;
            font-weight: bold;
            font-family: monospace;
            color: #28a745;
            margin: 10px 0;
        }
        .loading {
            display: none;
            margin-top: 20px;
            color: #667eea;
        }
        .loading.show {
            display: block;
        }
        .spinner {
            border: 3px solid #f3f3f3;
            border-top: 3px solid #667eea;
            border-radius: 50%;
            width: 40px;
            height: 40px;
            animation: spin 1s linear infinite;
            margin: 0 auto 10px;
        }
        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
        footer {
            margin-top: 30px;
            font-size: 12px;
            color: #999;
        }
        .stats {
            margin-top: 15px;
            font-size: 12px;
            color: #888;
        }
    </style>
</head>
<body>

        <h1>🔍 البحث عن كلمة المرور</h1>
        <div class="subtitle">أكاديمية مصر الحديثة</div>
        
        <div class="input-group">
            <label>📝 رقم الجلوس</label>
            <input type="text" id="studentId" placeholder="مثال: 4220240" maxlength="20" autocomplete="off">
        </div>
        
        <button onclick="searchStudent()">🔎 بحث</button>
        
        <div class="loading" id="loading">

        <div class="result" id="result">

        <div class="stats" id="stats"></div>

        // دالة البحث
        async function searchStudent() {
            const studentId = document.getElementById('studentId').value.trim();
            const resultDiv = document.getElementById('result');
            const loadingDiv = document.getElementById('loading');
            
            // إخفاء النتيجة السابقة
            resultDiv.className = 'result';
            resultDiv.style.display = 'none';
            
            // التحقق من الإدخال
            if (!studentId) {
                showError('الرجاء إدخال رقم الجلوس');
                return;
            }
            
            // إظهار التحميل
            loadingDiv.classList.add('show');
            
            // محاكاة تأخير بسيط
            setTimeout(() => {
                loadingDiv.classList.remove('show');
                
                // البحث في قاعدة البيانات
                const password = database[studentId];
                
                if (password) {
                    showSuccess(studentId, password);
                } else {
                    showNotFound(studentId);
                }
            }, 300);
        }
        
        function showSuccess(studentId, password) {
            const resultDiv = document.getElementById('result');
            resultDiv.className = 'result success';
            document.getElementById('resultTitle').innerHTML = '✅ تم العثور على النتيجة';
            document.getElementById('resultContent').innerHTML = `
                <div style="font-size: 16px; margin-bottom: 10px;">🆔 رقم الجلوس: <strong>${studentId}</strong></div>
                <div class="password">🔑 ${password}</div>
                <div style="font-size: 12px; margin-top: 10px;">📁 المصدر: قاعدة البيانات</div>
            `;
            resultDiv.style.display = 'block';
        }
        
        function showError(message) {
            const resultDiv = document.getElementById('result');
            resultDiv.className = 'result error';
            document.getElementById('resultTitle').innerHTML = '❌ خطأ';
            document.getElementById('resultContent').innerHTML = `<div>${message}</div>`;
            resultDiv.style.display = 'block';
        }
        
        function showNotFound(studentId) {
            const resultDiv = document.getElementById('result');
            resultDiv.className = 'result error';
            document.getElementById('resultTitle').innerHTML = '❌ لم يتم العثور';
            document.getElementById('resultContent').innerHTML = `
                <div>🆔 رقم الجلوس: <strong>${studentId}</strong></div>
                <div style="margin-top: 10px;">⚠️ لم يتم العثور على كلمة المرور لهذا الرقم</div>
                <div style="margin-top: 10px; font-size: 12px;">💡 قد يكون الرقم غير موجود في قاعدة البيانات</div>
            `;
            resultDiv.style.display = 'block';
        }
        
        // دعم الضغط على Enter
        document.getElementById('studentId').addEventListener('keypress', function(e) {
            if (e.key === 'Enter') {
                searchStudent();
            }
        });
        
        console.log(`✅ الصفحة جاهزة | قاعدة البيانات تحتوي على ${Object.keys(database).length} سجل`);
